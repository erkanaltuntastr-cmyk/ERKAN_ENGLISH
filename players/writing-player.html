<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Writing Workshop</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Literata:wght@500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --surface:#fbf9f4;--surface-low:#f5f3ee;--surface-mid:#f0eee9;--card:#ffffff;
  --border:#e4e2dd;--outline:#c4c8bf;
  --text:#1b1c19;--muted:#444842;
  --primary:#52604e;--primary-hover:#3d4a39;--primary-container:#d7e7d0;--on-primary:#ffffff;
  --secondary:#8b4e3d;--secondary-container:#ffdbd1;
  --correct:#3d4a39;--correct-bg:#dcfce7;
  --wrong:#ba1a1a;--wrong-bg:#ffdad6;
  --shadow:0 4px 16px rgba(125,140,120,.06);
  --radius-card:18px;--radius-btn:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;background:var(--surface);color:var(--text);font-size:15px;line-height:1.6}
h1,h2,h3{font-family:'Literata',Georgia,serif;letter-spacing:-.015em;font-weight:600}

header{background:linear-gradient(135deg,var(--secondary),#704031);color:var(--on-primary);padding:18px 28px;position:sticky;top:0;z-index:20;box-shadow:0 4px 16px rgba(139,78,61,.18)}
.hdr-inner{max-width:880px;margin:0 auto;display:flex;align-items:center;gap:14px}
.hdr-title{flex:1;min-width:0}
.hdr-title h1{font-size:1.05rem;font-weight:600;color:#fff;line-height:1.3}
.hdr-title p{font-size:.78rem;opacity:.85}
.hdr-btn{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.22);color:#fff;padding:7px 14px;border-radius:var(--radius-btn);font-size:.8rem;cursor:pointer;text-decoration:none;font-family:inherit;font-weight:600;transition:all .2s}
.hdr-btn:hover{background:rgba(255,255,255,.22)}

main{max-width:880px;margin:0 auto;padding:32px 28px 60px}

.brief{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-card);padding:28px 30px;margin-bottom:18px;box-shadow:var(--shadow)}
.brief h2{font-size:1.5rem;margin-bottom:10px}
.brief .desc{font-size:.96rem;color:var(--muted);line-height:1.55}
.brief-stats{display:flex;flex-wrap:wrap;gap:12px;margin-top:18px}
.brief-stat{background:var(--surface-low);border-radius:var(--radius-btn);padding:8px 14px;font-size:.82rem;color:var(--muted);font-weight:500}
.brief-stat strong{color:var(--secondary);font-weight:700}

.section{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-card);padding:22px 26px;margin-bottom:14px;box-shadow:var(--shadow)}
.section-head{display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none}
.section-head h3{flex:1;font-size:1.05rem}
.section-head .toggle{font-size:.74rem;color:var(--muted);font-weight:600}
.section-body{margin-top:14px}
.section.collapsed .section-body{display:none}

/* Plan */
.plan-row{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.plan-row label{font-size:.84rem;color:var(--muted);font-weight:600}
.plan-row input{padding:10px 13px;border:1px solid var(--outline);border-radius:var(--radius-btn);font-size:.95rem;font-family:inherit;background:var(--surface-low);color:var(--text);transition:all .2s}
.plan-row input:focus{outline:none;border-color:var(--secondary);background:var(--card);box-shadow:0 0 0 3px rgba(139,78,61,.12)}

/* Word bank */
.wb-group{margin-bottom:10px}
.wb-label{font-size:.74rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:700;margin-bottom:6px}
.wb-words{display:flex;flex-wrap:wrap;gap:6px}
.wb-chip{background:var(--surface-low);border:1px solid var(--border);border-radius:999px;padding:4px 11px;font-size:.82rem;color:var(--text);cursor:pointer;transition:all .15s;font-family:inherit}
.wb-chip:hover{background:var(--primary-container);border-color:var(--primary);color:var(--primary-hover)}
.wb-chip.quote{font-family:'Literata',serif;font-style:italic;padding:6px 14px;max-width:100%;white-space:normal;text-align:left;line-height:1.4}

/* Reference text (e.g. poem) */
.ref-card{background:var(--card);border:1px solid var(--border);border-left:4px solid var(--primary);border-radius:var(--radius-card);padding:22px 26px;margin-bottom:14px;box-shadow:var(--shadow)}
.ref-head{display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none}
.ref-head h3{flex:1;font-size:1.05rem}
.ref-meta{font-size:.78rem;color:var(--muted);font-weight:500}
.ref-toggle{font-size:.74rem;color:var(--muted);font-weight:600}
.ref-body{margin-top:14px;font-family:'Literata',Georgia,serif;font-size:1rem;line-height:1.8;white-space:pre-wrap;color:var(--text);padding:0 6px}
.ref-card.collapsed .ref-body{display:none}
.ref-attrib{margin-top:14px;font-size:.84rem;color:var(--muted);font-style:italic;text-align:right}

/* Stage */
.stage{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-card);padding:22px 26px;margin-bottom:14px;box-shadow:var(--shadow);border-left:4px solid var(--secondary)}
.stage-head{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;margin-bottom:8px}
.stage-num{font-family:'Literata',serif;font-size:1.1rem;color:var(--secondary);font-weight:700}
.stage-label{font-family:'Literata',serif;font-size:1.15rem;font-weight:600}
.stage-target{font-size:.74rem;color:var(--muted);background:var(--surface-low);padding:3px 10px;border-radius:999px;font-weight:600;margin-left:auto}
.stage-technique{font-size:.86rem;color:var(--primary);background:var(--primary-container);padding:8px 12px;border-radius:var(--radius-btn);margin-bottom:8px;font-weight:600}
.stage-hint{font-size:.84rem;color:var(--secondary);font-style:italic;margin-bottom:10px}
.stage-text{width:100%;min-height:140px;padding:14px;border:1px solid var(--outline);border-radius:var(--radius-btn);font-family:'Literata',Georgia,serif;font-size:1rem;line-height:1.7;background:var(--surface-low);color:var(--text);resize:vertical;transition:all .2s}
.stage-text:focus{outline:none;border-color:var(--secondary);background:var(--card);box-shadow:0 0 0 3px rgba(139,78,61,.12)}
.stage-foot{display:flex;align-items:center;gap:10px;margin-top:8px;flex-wrap:wrap}
.word-count{font-size:.82rem;color:var(--muted);font-weight:600}
.word-count.under{color:var(--secondary)}
.word-count.over{color:var(--wrong)}
.word-count.good{color:var(--correct)}
.btn-model{background:transparent;color:var(--primary);border:1px solid var(--primary-container);padding:6px 14px;border-radius:var(--radius-btn);font-size:.8rem;font-weight:600;cursor:pointer;font-family:inherit;margin-left:auto;transition:all .2s}
.btn-model:hover{background:var(--primary-container)}
.stage-model{margin-top:10px;background:var(--primary-container);padding:14px 16px;border-radius:var(--radius-btn);font-family:'Literata',serif;font-size:.96rem;line-height:1.65;color:var(--primary-hover);display:none;border-left:3px solid var(--primary)}
.stage-model.show{display:block}
.stage-model strong{display:block;font-family:inherit;font-size:.7rem;text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px;font-weight:700}

/* Rubric */
.rubric{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-card);padding:24px 26px;margin-bottom:14px;box-shadow:var(--shadow)}
.rubric h3{font-size:1.1rem;margin-bottom:14px}
.rubric-row{display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer}
.rubric-row:last-child{border-bottom:none}
.rubric-row input{margin-top:4px;width:18px;height:18px;accent-color:var(--primary);cursor:pointer;flex-shrink:0}
.rubric-row label{flex:1;cursor:pointer;font-size:.94rem;line-height:1.45}
.rubric-summary{margin-top:14px;padding:14px 16px;background:var(--surface-low);border-radius:var(--radius-btn);font-size:.94rem;color:var(--muted);text-align:center;font-weight:600}
.rubric-summary strong{font-family:'Literata',serif;font-size:1.4rem;color:var(--primary);display:block;margin-bottom:4px}

/* Actions */
.actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:22px}
.btn{padding:11px 22px;border:none;border-radius:var(--radius-btn);font-size:.92rem;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s;text-decoration:none;display:inline-block}
.btn-primary{background:var(--primary);color:var(--on-primary);box-shadow:0 2px 6px rgba(82,96,78,.2)}
.btn-primary:hover{background:var(--primary-hover);transform:translateY(-1px)}
.btn-secondary{background:var(--secondary);color:var(--on-primary)}
.btn-secondary:hover{background:#704031;transform:translateY(-1px)}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}
.btn-ghost:hover{color:var(--text);border-color:var(--outline);background:var(--surface-low)}

.autosave-note{font-size:.78rem;color:var(--muted);text-align:center;margin-top:8px;font-style:italic}

.error-card{background:var(--card);border:1px solid var(--wrong);border-radius:var(--radius-card);padding:36px;text-align:center;box-shadow:var(--shadow)}
.error-card h2{color:var(--wrong);margin-bottom:10px}
.error-card p{color:var(--muted)}
</style>
</head>
<body>

<header>
  <div class="hdr-inner">
    <div class="hdr-title">
      <h1 id="hdr-title">Loading…</h1>
      <p id="hdr-sub"></p>
    </div>
    <a class="hdr-btn" id="hdr-exit-link" href="../index.html">← Exit</a>
  </div>
</header>

<main id="main">
  <div id="error-area"></div>
  <div id="content"></div>
</main>

<script src="../js/normalize.js"></script>
<script src="../js/storage.js"></script>
<script src="../js/disk-sync.js"></script>
<script src="../js/profiles.js"></script>
<script src="../js/safe-html.js"></script>
<script src="../js/data-paths.js"></script>
<script src="../js/content-loader.js"></script>
<script src="../js/load-packs-sync.js"></script>
<script>
let PACK = null;
let PROFILE = null;
let STATE = { plan: {}, drafts: {}, rubric: {}, submitted: false };
let DRAFT_KEY = '';
let RETURN_URL = '../index.html';

const escapeHtml = (window.EceSafeHtml && window.EceSafeHtml.escapeHtml) || function(s){
  return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
};

function getReturnUrl(){
  const params = new URLSearchParams(location.search);
  const raw = params.get('returnTo');
  if (!raw) return '../index.html';
  try {
    const decoded = decodeURIComponent(raw);
    if (!decoded) return '../index.html';
    if (/^(https?:|\/\/|javascript:)/i.test(decoded)) return '../index.html';
    if (decoded.includes('..\\') || decoded.includes('../..')) return '../index.html';
    return decoded;
  } catch (e) {
    return '../index.html';
  }
}

function applyReturnUrl(){
  RETURN_URL = getReturnUrl();
  const hdr = document.getElementById('hdr-exit-link');
  if (hdr) hdr.href = RETURN_URL;
}

function getPackJsonUrls(packId){
  const filename = encodeURIComponent(packId) + '.json';
  if (window.EceDataPaths && typeof EceDataPaths.listCandidatePaths === 'function'){
    const candidates = EceDataPaths.listCandidatePaths('data/packs/' + filename);
    if (location.protocol === 'file:'){
      return candidates.map(path => '../' + path);
    }
    return candidates.map(path => EceDataPaths.toServerPath(path));
  }
  if (location.protocol === 'file:'){
    return ['../data/packs/' + filename];
  }
  return ['/data/packs/' + filename];
}

function isUsableWritingPack(pack, packId){
  return !!(
    pack &&
    pack.id === packId &&
    pack.type === 'writing-pack' &&
    Array.isArray(pack.stages) &&
    pack.stages.length > 0
  );
}

async function ensurePackLoaded(packId){
  if (!packId) return null;
  let pack = null;

  try {
    const urls = getPackJsonUrls(packId);
    for (const url of urls){
      const resp = await fetch(url);
      if (!resp.ok) continue;
      const data = await resp.json();
      if (window.EceContent && typeof EceContent.importPack === 'function'){
        const imported = EceContent.importPack(data, { onConflict: 'overwrite' });
        if (!imported || !imported.ok) {
          console.warn('Pack import failed:', imported && imported.errors ? imported.errors : imported);
          if (isUsableWritingPack(data, packId)) return data;
        } else {
          pack = typeof EceContent.findPack === 'function' ? EceContent.findPack(packId) : null;
          if (pack) return pack;
          if (isUsableWritingPack(data, packId)) return data;
        }
      } else if (isUsableWritingPack(data, packId)) {
        return data;
      }
    }
  } catch(e){
    console.warn('Pack fetch failed:', e);
  }

  pack = window.EceContent && typeof EceContent.findPack === 'function'
    ? EceContent.findPack(packId)
    : null;
  return pack || null;
}

function countWords(text){
  return (String(text||'').trim().match(/\S+/g) || []).length;
}

async function init(){
  applyReturnUrl();
  const params = new URLSearchParams(location.search);
  const packId = params.get('pack');
  const active = EceProfiles.getActive();
  if (!active){ location.href = '../index.html'; return; }
  PROFILE = EceProfiles.getProfile(active.profileId);

  if (!packId){ showError('No pack specified. URL is missing ?pack=...'); return; }
  PACK = await ensurePackLoaded(packId);

  if (!PACK){ showError('Writing pack not found: ' + packId + '<br><small style="font-weight:400">Make sure the server is running and data/packs/' + packId + '.json exists.</small>'); return; }
  if (PACK.type !== 'writing-pack'){ showError('This player is for writing-pack only. Got: ' + PACK.type); return; }

  DRAFT_KEY = 'erkan_writing_draft.' + PROFILE.id + '.' + PACK.id;
  loadDraft();
  render();
}

function loadDraft(){
  try {
    const raw = localStorage.getItem(DRAFT_KEY);
    if (raw){
      const saved = JSON.parse(raw);
      STATE.plan = saved.plan || {};
      STATE.drafts = saved.drafts || {};
      STATE.rubric = saved.rubric || {};
    }
  } catch(e){}
}

function saveDraft(){
  try {
    localStorage.setItem(DRAFT_KEY, JSON.stringify({
      plan: STATE.plan, drafts: STATE.drafts, rubric: STATE.rubric, savedAt: new Date().toISOString()
    }));
  } catch(e){ console.warn('saveDraft failed', e); }
}

function showError(msg){
  document.getElementById('error-area').innerHTML =
    '<div class="error-card"><h2>⚠ Cannot Load</h2><p>' + escapeHtml(msg) + '</p><br><a class="btn btn-primary" href="' + escapeHtml(RETURN_URL) + '">← Back</a></div>';
  document.getElementById('hdr-title').textContent = 'Error';
}

function render(){
  document.getElementById('hdr-title').textContent = PACK.title;
  document.getElementById('hdr-sub').textContent = (PROFILE ? PROFILE.name + ' — ' : '') + 'Writing Workshop';

  const c = document.getElementById('content');
  c.innerHTML = renderBrief() + renderReference() + renderPlan() + renderWordBank() + renderStages() + renderRubric() + renderActions();
  attachListeners();
  updateAllWordCounts();
  updateRubricSummary();
}

function renderBrief(){
  const tw = PACK.targetWords || {};
  return '<div class="brief">'
    + '<h2>' + escapeHtml(PACK.title) + '</h2>'
    + '<p class="desc">' + escapeHtml(PACK.brief) + '</p>'
    + '<div class="brief-stats">'
    +   '<div class="brief-stat">Genre: <strong>' + escapeHtml(PACK.genre || 'narrative') + '</strong></div>'
    +   '<div class="brief-stat">Target: <strong>' + (tw.min||'?') + '–' + (tw.max||'?') + ' words</strong></div>'
    +   '<div class="brief-stat">Time: <strong>' + (PACK.estimatedMinutes||'?') + ' min</strong></div>'
    +   '<div class="brief-stat">Stages: <strong>' + (PACK.stages||[]).length + '</strong></div>'
    + '</div>'
    + '</div>';
}

function renderReference(){
  if (!PACK.referenceText) return '';
  const title = PACK.referenceTitle || 'Reference text';
  const author = PACK.referenceAuthor ? ' — ' + PACK.referenceAuthor : '';
  return '<div class="ref-card" id="ref-card">'
    + '<div class="ref-head" onclick="toggleRef()">'
    +   '<h3>📜 ' + escapeHtml(title) + '</h3>'
    +   '<span class="ref-meta">' + escapeHtml(author.replace(/^ — /, '')) + '</span>'
    +   '<span class="ref-toggle">click to collapse</span>'
    + '</div>'
    + '<div class="ref-body">' + escapeHtml(PACK.referenceText) + '</div>'
    + (PACK.referenceAuthor ? '<div class="ref-attrib">— ' + escapeHtml(PACK.referenceAuthor) + '</div>' : '')
    + '</div>';
}

function toggleRef(){
  const el = document.getElementById('ref-card');
  if (el) el.classList.toggle('collapsed');
}

function renderPlan(){
  if (!Array.isArray(PACK.plan) || PACK.plan.length === 0) return '';
  let body = '';
  PACK.plan.forEach(p => {
    const v = STATE.plan[p.id] || '';
    body += '<div class="plan-row">'
      + '<label for="plan-' + p.id + '">' + escapeHtml(p.label) + '</label>'
      + '<input type="text" id="plan-' + p.id + '" data-plan-id="' + p.id + '" '
      +   'value="' + escapeHtml(v) + '" placeholder="' + escapeHtml(p.placeholder||'') + '"/>'
      + '</div>';
  });
  return '<div class="section" id="sec-plan">'
    + '<div class="section-head" onclick="toggleSection(\'sec-plan\')"><h3>📋 1. Plan</h3><span class="toggle">click to collapse</span></div>'
    + '<div class="section-body">' + body + '</div>'
    + '</div>';
}

function renderWordBank(){
  if (!PACK.wordBank || typeof PACK.wordBank !== 'object') return '';
  const isQuoteMode = !!PACK.wordBankIsQuotes;
  const title = PACK.wordBankTitle || (isQuoteMode ? 'Key Quotes Bank' : 'Word Bank');
  const helper = isQuoteMode
    ? 'Click a quote to insert it into your current paragraph. Embed quotes inside your sentences — don\'t leave them floating.'
    : 'Click a word to copy it. Don\'t cram them all in — pick what fits.';
  let body = '<div style="font-size:.86rem;color:var(--muted);margin-bottom:12px">' + helper + '</div>';
  Object.keys(PACK.wordBank).forEach(group => {
    const words = PACK.wordBank[group] || [];
    body += '<div class="wb-group">'
      + '<div class="wb-label">' + escapeHtml(group) + '</div>'
      + '<div class="wb-words">'
      + words.map(w => {
          const cls = 'wb-chip' + (isQuoteMode ? ' quote' : '');
          const display = isQuoteMode ? '"' + w + '"' : w;
          return '<span class="' + cls + '" data-insert="' + escapeHtml(isQuoteMode ? '"' + w + '"' : w) + '" onclick="copyWord(this)">' + escapeHtml(display) + '</span>';
        }).join('')
      + '</div>'
      + '</div>';
  });
  return '<div class="section" id="sec-wb">'
    + '<div class="section-head" onclick="toggleSection(\'sec-wb\')"><h3>📚 ' + escapeHtml(title) + '</h3><span class="toggle">click to collapse</span></div>'
    + '<div class="section-body">' + body + '</div>'
    + '</div>';
}

function renderStages(){
  let html = '';
  (PACK.stages || []).forEach((s, i) => {
    const wt = s.wordTarget || {};
    const v = STATE.drafts[s.id] || '';
    html += '<div class="stage" id="stage-' + s.id + '">'
      + '<div class="stage-head">'
      +   '<span class="stage-num">' + (i+2) + '.</span>'
      +   '<span class="stage-label">' + escapeHtml(s.label) + '</span>'
      +   (wt.min ? '<span class="stage-target">' + wt.min + '–' + wt.max + ' words</span>' : '')
      + '</div>'
      + (s.technique ? '<div class="stage-technique">🎯 Technique: ' + escapeHtml(s.technique) + '</div>' : '')
      + (s.hint ? '<div class="stage-hint">💡 ' + escapeHtml(s.hint) + '</div>' : '')
      + '<textarea class="stage-text" id="draft-' + s.id + '" data-stage-id="' + s.id + '" '
      +   'placeholder="Write here…">' + escapeHtml(v) + '</textarea>'
      + '<div class="stage-foot">'
      +   '<span class="word-count" id="wc-' + s.id + '">0 words</span>'
      +   (s.modelText ? '<button class="btn-model" onclick="toggleModel(\'' + s.id + '\')">👁 Show model</button>' : '')
      + '</div>'
      + (s.modelText
          ? '<div class="stage-model" id="model-' + s.id + '"><strong>Model — for comparison only</strong>' + escapeHtml(s.modelText) + '</div>'
          : '')
      + '</div>';
  });
  return html;
}

function renderRubric(){
  let rows = (PACK.rubric || []).map(r =>
    '<div class="rubric-row">'
    + '<input type="checkbox" id="rub-' + r.id + '" data-rubric-id="' + r.id + '" '
    + (STATE.rubric[r.id] ? 'checked' : '') + '/>'
    + '<label for="rub-' + r.id + '">' + escapeHtml(r.criterion) + '</label>'
    + '</div>'
  ).join('');
  return '<div class="rubric">'
    + '<h3>✅ Self-mark — check what you did</h3>'
    + rows
    + '<div class="rubric-summary" id="rubric-summary"></div>'
    + '</div>';
}

function renderActions(){
  return '<div class="actions">'
    + '<button class="btn btn-secondary" onclick="finishWriting()">Finish &amp; Save</button>'
    + '<button class="btn btn-ghost" onclick="exportDraft()">📄 Export as .txt</button>'
    + '<a class="btn btn-ghost" href="' + escapeHtml(RETURN_URL) + '">← Exit</a>'
    + '</div>'
    + '<div class="autosave-note">Your work is autosaved as you type.</div>';
}

function attachListeners(){
  // Plan inputs
  document.querySelectorAll('input[data-plan-id]').forEach(el => {
    el.addEventListener('input', () => {
      STATE.plan[el.dataset.planId] = el.value;
      saveDraft();
    });
  });
  // Stage textareas
  document.querySelectorAll('textarea[data-stage-id]').forEach(el => {
    el.addEventListener('input', () => {
      STATE.drafts[el.dataset.stageId] = el.value;
      saveDraft();
      updateWordCount(el.dataset.stageId);
    });
  });
  // Rubric checkboxes
  document.querySelectorAll('input[data-rubric-id]').forEach(el => {
    el.addEventListener('change', () => {
      STATE.rubric[el.dataset.rubricId] = el.checked;
      saveDraft();
      updateRubricSummary();
    });
  });
}

function updateWordCount(stageId){
  const stage = PACK.stages.find(s => s.id === stageId);
  const text = STATE.drafts[stageId] || '';
  const n = countWords(text);
  const el = document.getElementById('wc-' + stageId);
  if (!el) return;
  const wt = stage && stage.wordTarget;
  let cls = '';
  if (wt && wt.min && wt.max){
    if (n < wt.min) cls = 'under';
    else if (n > wt.max) cls = 'over';
    else cls = 'good';
  }
  el.className = 'word-count ' + cls;
  el.textContent = n + ' words' + (wt && wt.min ? ' (target ' + wt.min + '–' + wt.max + ')' : '');
}

function updateAllWordCounts(){
  (PACK.stages || []).forEach(s => updateWordCount(s.id));
}

function updateRubricSummary(){
  const total = (PACK.rubric || []).length;
  let checked = 0;
  (PACK.rubric || []).forEach(r => { if (STATE.rubric[r.id]) checked++; });
  const pct = total ? Math.round(checked / total * 100) : 0;
  let band = 'Keep going';
  if (pct >= 85) band = '🌟 Strong';
  else if (pct >= 65) band = '✓ Good';
  else if (pct >= 40) band = '↻ Review';
  document.getElementById('rubric-summary').innerHTML =
    '<strong>' + checked + ' / ' + total + '</strong>' + band + ' · ' + pct + '%';
}

function toggleSection(id){
  document.getElementById(id).classList.toggle('collapsed');
}

function toggleModel(stageId){
  const el = document.getElementById('model-' + stageId);
  if (el) el.classList.toggle('show');
}

function copyWord(el){
  // Insert at the cursor of the focused textarea, or the first stage textarea
  const word = el.dataset.insert || el.textContent;
  let target = document.activeElement;
  if (!target || target.tagName !== 'TEXTAREA'){
    target = document.querySelector('textarea[data-stage-id]');
  }
  if (target){
    const start = target.selectionStart || target.value.length;
    const end   = target.selectionEnd   || target.value.length;
    const before = target.value.slice(0, start);
    const after  = target.value.slice(end);
    const insert = (before && !/\s$/.test(before) ? ' ' : '') + word + (after && !/^\s/.test(after) ? ' ' : '');
    target.value = before + insert + after;
    target.focus();
    const pos = (before + insert).length;
    target.setSelectionRange(pos, pos);
    // Fire input event so STATE updates
    target.dispatchEvent(new Event('input', { bubbles: true }));
  }
}

function finishWriting(){
  const totalWords = (PACK.stages || []).reduce((s, st) => s + countWords(STATE.drafts[st.id]||''), 0);
  const rubricTotal = (PACK.rubric || []).length;
  let rubricScore = 0;
  (PACK.rubric || []).forEach(r => { if (STATE.rubric[r.id]) rubricScore++; });
  const pct = rubricTotal ? Math.round(rubricScore / rubricTotal * 100) : 0;

  const result = {
    profileId: PROFILE.id,
    packId: PACK.id,
    packTitle: PACK.title,
    subject: PACK.subject,
    type: 'writing-pack',
    date: new Date().toISOString(),
    wordCount: totalWords,
    rubricScore: rubricScore,
    rubricTotal: rubricTotal,
    percentage: pct,
    score: rubricScore,
    totalAuto: rubricTotal,
    totalQuestions: rubricTotal,
    sections: [],
    weakSections: [],
    answers: [],
    plan: STATE.plan,
    drafts: STATE.drafts,
    rubricMarks: STATE.rubric
  };

  EceStorage.saveResult(result);
  alert('Saved!\n\nTotal: ' + totalWords + ' words\nSelf-mark: ' + rubricScore + '/' + rubricTotal + ' (' + pct + '%)');
  location.href = RETURN_URL;
}

function exportDraft(){
  let txt = PACK.title + '\n';
  txt += '='.repeat(PACK.title.length) + '\n\n';
  txt += 'By: ' + (PROFILE ? PROFILE.name : '?') + '\n';
  txt += 'Date: ' + new Date().toLocaleDateString() + '\n\n';
  if (Object.keys(STATE.plan).length){
    txt += '--- Plan ---\n';
    (PACK.plan || []).forEach(p => {
      if (STATE.plan[p.id]) txt += p.label + ': ' + STATE.plan[p.id] + '\n';
    });
    txt += '\n';
  }
  txt += '--- Story ---\n\n';
  (PACK.stages || []).forEach(s => {
    if (STATE.drafts[s.id]) txt += STATE.drafts[s.id] + '\n\n';
  });
  const totalWords = (PACK.stages || []).reduce((sum, st) => sum + countWords(STATE.drafts[st.id]||''), 0);
  txt += '\n[' + totalWords + ' words]\n';

  const blob = new Blob([txt], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = (PROFILE ? PROFILE.name + '-' : '') + PACK.id + '.txt';
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 100);
}

init();
</script>
